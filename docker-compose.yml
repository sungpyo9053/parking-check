services:
  db:
    image: postgis/postgis:16-3.4
    container_name: parking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parking}
      POSTGRES_DB: ${POSTGRES_DB:-parking}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: parking-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # 컨테이너 간 통신용으로 host override
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-parking}:${POSTGRES_PASSWORD:-parking}@db:5432/${POSTGRES_DB:-parking}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # 개발 중에는 코드 마운트해서 reload
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
